name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo test --workspace --all-features --locked
      - run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

  platform-test:
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Compile workspace tests
        run: cargo test --workspace --locked --no-run
      - name: Run workspace tests
        if: runner.os != 'Windows'
        run: cargo test --workspace --locked
      - name: Run Core tests
        if: runner.os == 'Windows'
        run: cargo test -p a3s-use-core --locked
      - name: Run Browser library tests
        if: runner.os == 'Windows'
        run: cargo test -p a3s-use-browser --locked
      - name: Run Office tests
        if: runner.os == 'Windows'
        run: cargo test -p a3s-use-office --locked
      - name: Run extension tests
        if: runner.os == 'Windows'
        run: cargo test -p a3s-use-extension --locked
      - name: Run Browser driver tests
        if: runner.os == 'Windows'
        run: cargo test -p a3s-use-browser-driver --locked
      - name: Run facade unit tests
        if: runner.os == 'Windows'
        run: cargo test -p a3s-use --lib --bin a3s-use --locked
      - name: Run facade CLI integration tests
        if: runner.os == 'Windows'
        run: cargo test -p a3s-use --test cli --locked
      - name: Run facade documentation tests
        if: runner.os == 'Windows'
        run: cargo test -p a3s-use --doc --locked
