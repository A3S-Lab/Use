name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing version tag to rebuild or recover
        required: true
        type: string

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Resolve and validate release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version=$(cargo metadata --no-deps --format-version 1 | python3 -c 'import json,sys; print(next(package["version"] for package in json.load(sys.stdin)["packages"] if package["name"] == "a3s-use"))')
          echo "version=${version}" >> "${GITHUB_OUTPUT}"
          echo "tag=v${version}" >> "${GITHUB_OUTPUT}"
          if test "${GITHUB_EVENT_NAME}" = "push"; then
            test "${GITHUB_REF_NAME}" = "v${version}"
          else
            test "${{ inputs.release_tag }}" = "v${version}"
          fi
      - run: cargo fmt --all -- --check
      - run: cargo test --workspace --all-features --locked -- --test-threads=1
      - run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

  binaries:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            name: darwin-arm64
          - os: macos-15-intel
            target: x86_64-apple-darwin
            name: darwin-x86_64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            name: linux-arm64
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            name: linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --locked --target "${{ matrix.target }}" -p a3s-use -p a3s-use-browser-driver
      - name: Package Unix release
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          version="${{ needs.validate.outputs.version }}"
          archive="a3s-use-${version}-${{ matrix.name }}.tar.gz"
          stage="${RUNNER_TEMP}/a3s-use-${version}-${{ matrix.name }}"
          install -d "${stage}/skills" "${stage}/skill-data" "${stage}/document-skills" "${stage}/office-skills" "${stage}/ocr-skills" "${stage}/dashboard"
          install -m 0755 "target/${{ matrix.target }}/release/a3s-use" "${stage}/a3s-use"
          install -m 0755 "target/${{ matrix.target }}/release/a3s-use-browser-driver" "${stage}/a3s-use-browser-driver"
          A3S_USE_OCR_HOME="${stage}/ocr-models" \
            "${stage}/a3s-use" component install ocr --json > "${RUNNER_TEMP}/ocr-model-install.json"
          rm -f "${stage}/ocr-models/.install.lock"
          cp -R crates/browser-driver/skills/. "${stage}/skills/"
          cp -R crates/browser-driver/skill-data/. "${stage}/skill-data/"
          cp -R crates/office/skills/. "${stage}/office-skills/"
          cp -R crates/ocr/skills/. "${stage}/ocr-skills/"
          cp -R crates/document/skills/. "${stage}/document-skills/"
          cp -R crates/browser-driver/dashboard/out/. "${stage}/dashboard/"
          install -m 0644 LICENSE README.md THIRD_PARTY_NOTICES.md "${stage}/"
          install -m 0644 crates/browser-driver/LICENSE-APACHE-2.0 "${stage}/LICENSE-APACHE-2.0"
          install -m 0644 crates/browser-driver/UPSTREAM.md "${stage}/UPSTREAM.md"
          tar czf "${archive}" -C "${stage}" .
          echo "ARCHIVE=${archive}" >> "${GITHUB_ENV}"
      - name: Package Windows release
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = "${{ needs.validate.outputs.version }}"
          $archive = "a3s-use-$version-${{ matrix.name }}.zip"
          $stage = Join-Path $env:RUNNER_TEMP "a3s-use-$version-${{ matrix.name }}"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/a3s-use.exe" "$stage/a3s-use.exe"
          Copy-Item "target/${{ matrix.target }}/release/a3s-use-browser-driver.exe" "$stage/a3s-use-browser-driver.exe"
          $env:A3S_USE_OCR_HOME = "$stage/ocr-models"
          & "$stage/a3s-use.exe" component install ocr --json | Out-File "$env:RUNNER_TEMP/ocr-model-install.json"
          if ($LASTEXITCODE -ne 0) { throw "Failed to install the pinned PP-OCRv6 release assets" }
          Remove-Item Env:A3S_USE_OCR_HOME
          Remove-Item "$stage/ocr-models/.install.lock" -ErrorAction SilentlyContinue
          Copy-Item -Recurse "crates/browser-driver/skills" "$stage/skills"
          Copy-Item -Recurse "crates/browser-driver/skill-data" "$stage/skill-data"
          Copy-Item -Recurse "crates/office/skills" "$stage/office-skills"
          Copy-Item -Recurse "crates/ocr/skills" "$stage/ocr-skills"
          Copy-Item -Recurse "crates/document/skills" "$stage/document-skills"
          Copy-Item -Recurse "crates/browser-driver/dashboard/out" "$stage/dashboard"
          Copy-Item LICENSE,README.md,THIRD_PARTY_NOTICES.md $stage
          Copy-Item crates/browser-driver/LICENSE-APACHE-2.0 "$stage/LICENSE-APACHE-2.0"
          Copy-Item crates/browser-driver/UPSTREAM.md "$stage/UPSTREAM.md"
          Compress-Archive -Path "$stage/*" -DestinationPath $archive
          "ARCHIVE=$archive" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
      - name: Verify installed Unix release
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          install_root="${RUNNER_TEMP}/installed-${{ matrix.name }}"
          install -d "${install_root}"
          tar xzf "${ARCHIVE}" -C "${install_root}"
          test -x "${install_root}/a3s-use"
          test -x "${install_root}/a3s-use-browser-driver"
          test -f "${install_root}/skill-data/core/SKILL.md"
          test -f "${install_root}/office-skills/a3s-use-office/SKILL.md"
          test -f "${install_root}/ocr-skills/a3s-use-ocr/SKILL.md"
          test -f "${install_root}/document-skills/a3s-use-document/SKILL.md"
          test -f "${install_root}/ocr-models/PP-OCRv6_small/det/inference.onnx"
          test -f "${install_root}/ocr-models/PP-OCRv6_small/det/inference.yml"
          test -f "${install_root}/ocr-models/PP-OCRv6_small/rec/inference.onnx"
          test -f "${install_root}/ocr-models/PP-OCRv6_small/rec/inference.yml"
          test -f "${install_root}/dashboard/index.html"
          test -f "${install_root}/LICENSE-APACHE-2.0"
          test -f "${install_root}/UPSTREAM.md"
          test -f "${install_root}/THIRD_PARTY_NOTICES.md"
          "${install_root}/a3s-use" --version
          A3S_USE_BROWSER_SKILLS_DIR="${install_root}/skill-data" \
            "${install_root}/a3s-use" browser skills list --json > "${RUNNER_TEMP}/skills.json"
          python3 - "${RUNNER_TEMP}/skills.json" <<'PY'
          import json, pathlib, sys
          value = json.loads(pathlib.Path(sys.argv[1]).read_text())
          assert value["success"] is True
          assert {item["name"] for item in value["data"]} == {
              "agentcore", "core", "dogfood", "electron", "slack", "vercel-sandbox"
          }
          PY
          "${install_root}/a3s-use" ocr doctor --json > "${RUNNER_TEMP}/ocr-doctor.json"
          python3 - "${RUNNER_TEMP}/ocr-doctor.json" <<'PY'
          import json, pathlib, sys
          value = json.loads(pathlib.Path(sys.argv[1]).read_text())
          assert value["ok"] is True
          assert value["data"]["readiness"] == "ready"
          assert value["data"]["provider"] == "pp-ocr-v6"
          assert value["data"]["engine"] == "onnx-runtime"
          assert value["data"]["model"] == "PP-OCRv6_small"
          assert value["data"]["sendsSourceOffDevice"] is False
          PY
          python3 - "${RUNNER_TEMP}/ocr-white.bmp" <<'PY'
          import base64, pathlib, sys
          pathlib.Path(sys.argv[1]).write_bytes(base64.b64decode(
              "Qk06AAAAAAAAADYAAAAoAAAAAQAAAAEAAAABABgAAAAAAAQAAAAAAAAAAAAAAAAAAAAAAAAA////AA=="
          ))
          PY
          "${install_root}/a3s-use" ocr extract "${RUNNER_TEMP}/ocr-white.bmp" --json > "${RUNNER_TEMP}/ocr-extract.json"
          python3 - "${RUNNER_TEMP}/ocr-extract.json" <<'PY'
          import json, pathlib, sys
          value = json.loads(pathlib.Path(sys.argv[1]).read_text())
          assert value["ok"] is True
          assert value["data"]["provider"] == "pp-ocr-v6"
          assert value["data"]["engine"] == "onnx-runtime"
          assert value["data"]["model"] == "PP-OCRv6_small"
          assert value["data"]["source"]["mediaType"] == "image/bmp"
          PY
          "${install_root}/a3s-use" document inspect "${RUNNER_TEMP}/ocr-white.bmp" --json > "${RUNNER_TEMP}/document-inspect.json"
          python3 - "${RUNNER_TEMP}/document-inspect.json" <<'PY'
          import json, pathlib, sys
          value = json.loads(pathlib.Path(sys.argv[1]).read_text())
          assert value["ok"] is True
          assert value["data"]["source"]["kind"] == "image"
          assert value["data"]["images"][0]["recommendation"] == "required"
          assert value["data"]["images"][0]["ocrState"] == "not-selected"
          PY
          "${install_root}/a3s-use" document parse "${RUNNER_TEMP}/ocr-white.bmp" --ocr auto --json > "${RUNNER_TEMP}/document-parse.json"
          python3 - "${RUNNER_TEMP}/document-parse.json" <<'PY'
          import json, pathlib, sys
          value = json.loads(pathlib.Path(sys.argv[1]).read_text())
          assert value["ok"] is True
          assert value["data"]["source"]["kind"] == "image"
          assert value["data"]["ocr"]["provider"] == "pp-ocr-v6"
          assert value["data"]["ocr"]["engine"] == "onnx-runtime"
          assert value["data"]["ocr"]["model"] == "PP-OCRv6_small"
          assert value["data"]["ocr"]["selectedImages"] == 1
          assert value["data"]["ocr"]["processedImages"] == 1
          assert value["data"]["ocr"]["sendsSourceOffDevice"] is False
          assert value["data"]["images"][0]["ocrState"] in {"empty", "processed"}
          PY
          "${install_root}/a3s-use" capability snapshot --json > "${RUNNER_TEMP}/capabilities.json"
          python3 - "${RUNNER_TEMP}/capabilities.json" "${install_root}" <<'PY'
          import json, pathlib, sys
          value = json.loads(pathlib.Path(sys.argv[1]).read_text())
          root = pathlib.Path(sys.argv[2]).resolve()
          ocr = next(
              capability
              for capability in value["data"]["registry"]["capabilities"]
              if capability["id"] == "use/ocr"
          )
          assert ocr["mcp"]["target"] == "ocr-native"
          assert len(ocr["skills"]) == 1
          assert pathlib.Path(ocr["skills"][0]["path"]).resolve() == (
              root / "ocr-skills" / "a3s-use-ocr" / "SKILL.md"
          )
          document = next(
              capability
              for capability in value["data"]["registry"]["capabilities"]
              if capability["id"] == "use/document"
          )
          assert document["readiness"] == "ready"
          assert document["mcp"]["target"] == "document-native"
          assert len(document["skills"]) == 1
          assert pathlib.Path(document["skills"][0]["path"]).resolve() == (
              root / "document-skills" / "a3s-use-document" / "SKILL.md"
          )
          PY
          A3S_OFFICECLI_EXECUTABLE="${install_root}/must-not-be-invoked" \
            "${install_root}/a3s-use" office skills list --json > "${RUNNER_TEMP}/office-skills.json"
          python3 - "${RUNNER_TEMP}/office-skills.json" <<'PY'
          import json, pathlib, sys
          value = json.loads(pathlib.Path(sys.argv[1]).read_text())
          assert value["ok"] is True
          assert [item["name"] for item in value["data"]] == ["a3s-use-office"]
          PY
          printf '%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-06-18","capabilities":{},"clientInfo":{"name":"release-smoke","version":"1"}}}' \
            '{"jsonrpc":"2.0","method":"notifications/initialized","params":{}}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}' \
            '{"jsonrpc":"2.0","id":3,"method":"tools/list","params":{"cursor":"64"}}' \
            '{"jsonrpc":"2.0","id":4,"method":"tools/list","params":{"cursor":"128"}}' \
            | "${install_root}/a3s-use" mcp serve browser --tools all > "${RUNNER_TEMP}/mcp.jsonl"
          python3 - "${RUNNER_TEMP}/mcp.jsonl" <<'PY'
          import json, pathlib, sys
          values = [json.loads(line) for line in pathlib.Path(sys.argv[1]).read_text().splitlines()]
          by_id = {value.get("id"): value for value in values if "id" in value}
          assert by_id[1]["result"]["serverInfo"]["name"] == "a3s-use-browser"
          tools = [tool for request_id in (2, 3, 4) for tool in by_id[request_id]["result"]["tools"]]
          assert len(tools) == 151
          assert any(tool["name"] == "agent_browser_open" for tool in tools)
          PY
      - name: Verify installed Windows release
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $root = Join-Path $env:RUNNER_TEMP "installed-${{ matrix.name }}"
          Expand-Archive -Path $env:ARCHIVE -DestinationPath $root
          @(
            "$root/a3s-use.exe",
            "$root/a3s-use-browser-driver.exe",
            "$root/skill-data/core/SKILL.md",
            "$root/office-skills/a3s-use-office/SKILL.md",
            "$root/ocr-skills/a3s-use-ocr/SKILL.md",
            "$root/document-skills/a3s-use-document/SKILL.md",
            "$root/ocr-models/PP-OCRv6_small/det/inference.onnx",
            "$root/ocr-models/PP-OCRv6_small/det/inference.yml",
            "$root/ocr-models/PP-OCRv6_small/rec/inference.onnx",
            "$root/ocr-models/PP-OCRv6_small/rec/inference.yml",
            "$root/dashboard/index.html",
            "$root/LICENSE-APACHE-2.0",
            "$root/UPSTREAM.md",
            "$root/THIRD_PARTY_NOTICES.md"
          ) | ForEach-Object { if (-not (Test-Path $_ -PathType Leaf)) { throw "Missing release file $_" } }
          & "$root/a3s-use.exe" --version
          if ($LASTEXITCODE -ne 0) { throw "a3s-use --version failed" }
          $env:A3S_USE_BROWSER_SKILLS_DIR = "$root/skill-data"
          $skills = (& "$root/a3s-use.exe" browser skills list --json | ConvertFrom-Json)
          if (-not $skills.success -or $skills.data.Count -ne 6) { throw "Packaged Skills smoke failed" }
          $env:A3S_OFFICECLI_EXECUTABLE = "$root/must-not-be-invoked.exe"
          $officeSkills = (& "$root/a3s-use.exe" office skills list --json | ConvertFrom-Json)
          if (-not $officeSkills.ok -or $officeSkills.data.Count -ne 1 -or $officeSkills.data[0].name -ne "a3s-use-office") {
            throw "Packaged Office Skill smoke failed"
          }
          $ocr = (& "$root/a3s-use.exe" ocr doctor --json | ConvertFrom-Json)
          if (
            -not $ocr.ok -or
            $ocr.data.readiness -ne "ready" -or
            $ocr.data.provider -ne "pp-ocr-v6" -or
            $ocr.data.engine -ne "onnx-runtime" -or
            $ocr.data.model -ne "PP-OCRv6_small" -or
            $ocr.data.sendsSourceOffDevice
          ) { throw "Packaged PP-OCRv6 doctor smoke failed" }
          $whiteBmp = [Convert]::FromBase64String("Qk06AAAAAAAAADYAAAAoAAAAAQAAAAEAAAABABgAAAAAAAQAAAAAAAAAAAAAAAAAAAAAAAAA////AA==")
          [IO.File]::WriteAllBytes("$env:RUNNER_TEMP/ocr-white.bmp", $whiteBmp)
          $ocrExtract = (& "$root/a3s-use.exe" ocr extract "$env:RUNNER_TEMP/ocr-white.bmp" --json | ConvertFrom-Json)
          if (
            -not $ocrExtract.ok -or
            $ocrExtract.data.provider -ne "pp-ocr-v6" -or
            $ocrExtract.data.engine -ne "onnx-runtime" -or
            $ocrExtract.data.model -ne "PP-OCRv6_small" -or
            $ocrExtract.data.source.mediaType -ne "image/bmp"
          ) { throw "Packaged PP-OCRv6 extraction smoke failed" }
          $documentInspect = (& "$root/a3s-use.exe" document inspect "$env:RUNNER_TEMP/ocr-white.bmp" --json | ConvertFrom-Json)
          if (
            -not $documentInspect.ok -or
            $documentInspect.data.source.kind -ne "image" -or
            $documentInspect.data.images[0].recommendation -ne "required" -or
            $documentInspect.data.images[0].ocrState -ne "not-selected"
          ) { throw "Packaged Document inspection smoke failed" }
          $documentParse = (& "$root/a3s-use.exe" document parse "$env:RUNNER_TEMP/ocr-white.bmp" --ocr auto --json | ConvertFrom-Json)
          if (
            -not $documentParse.ok -or
            $documentParse.data.source.kind -ne "image" -or
            $documentParse.data.ocr.provider -ne "pp-ocr-v6" -or
            $documentParse.data.ocr.engine -ne "onnx-runtime" -or
            $documentParse.data.ocr.model -ne "PP-OCRv6_small" -or
            $documentParse.data.ocr.selectedImages -ne 1 -or
            $documentParse.data.ocr.processedImages -ne 1 -or
            $documentParse.data.ocr.sendsSourceOffDevice
          ) { throw "Packaged Document parse smoke failed" }
          $capabilities = (& "$root/a3s-use.exe" capability snapshot --json | ConvertFrom-Json)
          $ocrCapability = $capabilities.data.registry.capabilities |
            Where-Object id -eq "use/ocr"
          if ($ocrCapability.mcp.target -ne "ocr-native" -or $ocrCapability.skills.Count -ne 1) {
            throw "Built-in OCR capability projection smoke failed"
          }
          $expectedOcrSkill = (Resolve-Path "$root/ocr-skills/a3s-use-ocr/SKILL.md").Path
          $actualOcrSkill = (Resolve-Path $ocrCapability.skills[0].path).Path
          if (-not [StringComparer]::OrdinalIgnoreCase.Equals($actualOcrSkill, $expectedOcrSkill)) {
            throw "Built-in OCR Skill was not projected from the installed release"
          }
          $documentCapability = $capabilities.data.registry.capabilities |
            Where-Object id -eq "use/document"
          if (
            $documentCapability.readiness -ne "ready" -or
            $documentCapability.mcp.target -ne "document-native" -or
            $documentCapability.skills.Count -ne 1
          ) { throw "Built-in Document capability projection smoke failed" }
          $expectedDocumentSkill = (Resolve-Path "$root/document-skills/a3s-use-document/SKILL.md").Path
          $actualDocumentSkill = (Resolve-Path $documentCapability.skills[0].path).Path
          if (-not [StringComparer]::OrdinalIgnoreCase.Equals($actualDocumentSkill, $expectedDocumentSkill)) {
            throw "Built-in Document Skill was not projected from the installed release"
          }
          $requests = @(
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2025-06-18","capabilities":{},"clientInfo":{"name":"release-smoke","version":"1"}}}',
            '{"jsonrpc":"2.0","method":"notifications/initialized","params":{}}',
            '{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}',
            '{"jsonrpc":"2.0","id":3,"method":"tools/list","params":{"cursor":"64"}}',
            '{"jsonrpc":"2.0","id":4,"method":"tools/list","params":{"cursor":"128"}}'
          )
          $responses = ($requests -join "`n") | & "$root/a3s-use.exe" mcp serve browser --tools all
          if ($LASTEXITCODE -ne 0) { throw "Packaged MCP smoke failed" }
          $values = @($responses | ForEach-Object { $_ | ConvertFrom-Json })
          $initialized = $values | Where-Object id -eq 1
          if ($initialized.result.serverInfo.name -ne "a3s-use-browser") { throw "Wrong MCP server identity" }
          $toolCount = (($values | Where-Object { $_.id -in 2,3,4 }).result.tools | Measure-Object).Count
          if ($toolCount -ne 151) { throw "Expected 151 MCP tools, got $toolCount" }
      - uses: actions/upload-artifact@v4
        with:
          name: a3s-use-${{ matrix.name }}
          path: ${{ env.ARCHIVE }}

  publish-crates:
    name: Publish typed Rust crates
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish Core, OCR, then Browser
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}
          VERSION: ${{ needs.validate.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail

          is_published() {
            local package="$1"
            curl --retry 5 --retry-all-errors --retry-delay 5 -fsSL \
              -A "a3s-use-release-check/1.0" \
              "https://crates.io/api/v1/crates/${package}/${VERSION}" >/dev/null
          }

          publish_once() {
            local package="$1"
            if is_published "${package}"; then
              echo "${package} ${VERSION} is already published"
              return
            fi
            cargo publish --locked -p "${package}"
          }

          wait_until_visible() {
            local package="$1"
            for attempt in $(seq 1 30); do
              if is_published "${package}"; then
                return
              fi
              echo "Waiting for ${package} ${VERSION} on crates.io (${attempt}/30)"
              sleep 10
            done
            echo "${package} ${VERSION} did not become visible in time" >&2
            exit 1
          }

          publish_once a3s-use-core
          wait_until_visible a3s-use-core
          publish_once a3s-use-ocr
          wait_until_visible a3s-use-ocr
          publish_once a3s-use-browser

  release:
    needs: [binaries, publish-crates]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz *.zip > checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/checksums.txt
