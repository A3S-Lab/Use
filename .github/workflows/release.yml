name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: Require tag to match Cargo version
        shell: bash
        run: |
          version=$(cargo metadata --no-deps --format-version 1 | python3 -c 'import json,sys; print(next(package["version"] for package in json.load(sys.stdin)["packages"] if package["name"] == "a3s-use"))')
          test "${GITHUB_REF_NAME}" = "v${version}"
      - run: cargo fmt --all -- --check
      - run: cargo test --workspace --all-features --locked
      - run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

  binaries:
    needs: validate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
            name: darwin-arm64
          - os: macos-13
            target: x86_64-apple-darwin
            name: darwin-x86_64
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            name: linux-arm64
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            name: linux-x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --locked --target "${{ matrix.target }}" --bin a3s-use
      - name: Package
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          archive="a3s-use-${version}-${{ matrix.name }}.tar.gz"
          tar czf "${archive}" -C "target/${{ matrix.target }}/release" a3s-use
          echo "ARCHIVE=${archive}" >> "${GITHUB_ENV}"
      - uses: actions/upload-artifact@v4
        with:
          name: a3s-use-${{ matrix.name }}
          path: ${{ env.ARCHIVE }}

  release:
    needs: binaries
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Generate checksums
        run: |
          cd artifacts
          sha256sum *.tar.gz > checksums.txt
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/checksums.txt
